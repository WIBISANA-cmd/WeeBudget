services:
  api:
    build:
      context: ./weeb-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: WeeBudget
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-weeb}
      DB_USERNAME: ${DB_USERNAME:-weeb}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-}
      SANCTUM_EXPIRATION: ${SANCTUM_EXPIRATION:-null}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  ui:
    build:
      context: ./weeb-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-weeb}
      MYSQL_USER: ${DB_USERNAME:-weeb}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - weeb_mysql_data:/var/lib/mysql

volumes:
  weeb_mysql_data:
