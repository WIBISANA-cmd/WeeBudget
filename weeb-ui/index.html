<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-pwa.png" />
    <link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08a0ff" />
    <meta name="description" content="WeeBudget membantu mengatur rekening, transaksi, budget planner, tabungan, dana darurat, dan wishlist dalam satu dashboard finansial." />
    <meta name="application-name" content="WeeBudget" />
    <meta property="og:title" content="WeeBudget - Smart Personal Finance" />
    <meta property="og:description" content="Dashboard finansial modern untuk mengelola uang harian, tabungan, dana darurat, wishlist, dan rencana bersama." />
    <meta property="og:type" content="website" />
    <title>WeeBudget - Smart Personal Finance</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem('weeb_theme');
          var theme;
          if (storedTheme === 'dark' || storedTheme === 'light') {
            theme = storedTheme;
          } else {
            // Time-based auto theme: night (18:30–05:59) → dark, else → light
            var now = new Date();
            var totalMin = now.getHours() * 60 + now.getMinutes();
            theme = (totalMin >= 1110 || totalMin < 360) ? 'dark' : 'light';
          }
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.style.colorScheme = theme;
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', theme === 'dark' ? '#0a0a0a' : '#08a0ff');
          if (theme === 'dark') document.body.style.backgroundColor = '#0a0a0a';
        } catch {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
