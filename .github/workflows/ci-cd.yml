name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Laravel API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: weeb-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: bcmath, intl, mbstring, pdo_sqlite, sqlite3, zip
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('weeb-api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Create Laravel environment file
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare Laravel environment
        run: php artisan key:generate --ansi

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-publish

      - name: Run API tests
        run: composer test

  ui:
    name: React UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: weeb-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: weeb-ui/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Lint UI
        run: npm run lint

      - name: Build UI
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - api
      - ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all-in-one image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: weeb:ci
          build-args: |
            VITE_API_BASE_URL=/api

      - name: Build compose images
        run: docker compose build
        env:
          APP_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:8080
          VITE_API_BASE_URL: http://localhost:8000/api
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_DATABASE: weeb
          DB_USERNAME: weeb
          DB_PASSWORD: ci-password
          DB_ROOT_PASSWORD: ci-root-password
          GOOGLE_REDIRECT_URI: http://localhost:8000/api/auth/google/callback

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
      DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}

    steps:
      - name: Trigger deployment webhook
        if: env.DEPLOY_WEBHOOK_URL != ''
        run: |
          if [ -n "$DEPLOY_WEBHOOK_TOKEN" ]; then
            curl --fail --show-error --location \
              --request POST \
              --header "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN" \
              "$DEPLOY_WEBHOOK_URL"
          else
            curl --fail --show-error --location \
              --request POST \
              "$DEPLOY_WEBHOOK_URL"
          fi

      - name: Skip deployment webhook
        if: env.DEPLOY_WEBHOOK_URL == ''
        run: echo "DEPLOY_WEBHOOK_URL is not configured; CI passed, deployment was skipped."
